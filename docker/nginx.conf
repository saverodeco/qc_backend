server {
    listen ${PORT};
    server_name _;
    root /var/www/html/public;

    index index.php index.html;

    client_max_body_size 20M; # foto QC bisa sampai ~5MB tiap file, kasih ruang aman

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # fetch() dari frontend (Vercel, domain beda) buat fitur "simpan ke
    # galeri" butuh header CORS di sini — beda dari <img src="..."> biasa
    # yang tidak butuh CORS sama sekali cuma buat ditampilkan.
    location /storage/ {
        add_header 'Access-Control-Allow-Origin' 'https://qc-frontend-1pjx.vercel.app' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}